<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xeon AI Audio Studio</title>
    <!-- 구글 폰트 및 아이콘 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0e0e10;
            --sidebar-bg: #18181b;
            --accent-purple: #6d28d9;
            --text-main: #efeff1;
            --text-dim: #adadb8;
            --border-color: #2f2f35;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main);
            overflow: hidden;
        }

        .app-container { display: flex; height: 100vh; }

        /* --- 좌측 레이아웃 (사이드바) --- */
        .sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; transition: 0.3s;
        }

        .sidebar-header { padding: 20px; font-weight: 800; font-size: 1.2rem; display: flex; justify-content: space-between; }

        .menu-section { padding: 10px 0; }
        .section-title { font-size: 0.75rem; color: var(--text-dim); padding: 0 20px 10px; text-transform: uppercase; letter-spacing: 1px; }

        .menu-item {
            padding: 12px 20px; display: flex; align-items: center; cursor: pointer;
            color: var(--text-dim); transition: 0.2s; font-size: 0.9rem;
        }
        .menu-item i { width: 25px; margin-right: 10px; }
        .menu-item:hover, .menu-item.active { background-color: #26262c; color: var(--text-main); }
        .menu-item.active { border-left: 3px solid var(--accent-purple); color: var(--accent-purple); }

        /* 트랙 보관함 */
        .library-section { flex-grow: 1; border-top: 1px solid var(--border-color); padding-top: 15px; overflow-y: auto; }
        .folder-item { padding: 8px 20px; font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; cursor: pointer; }
        .folder-item:hover { color: white; }
        .track-list-item { padding: 5px 35px; font-size: 0.8rem; color: #888; cursor: move; }

        /* --- 우측 레이아웃 (메인 콘텐츠) --- */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Moises 스타일 업로드 뷰 (image_c9f029.png 참고) */
        .upload-view {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; text-align: center; padding: 20px;
        }

        .hero-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .hero-subtitle { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 40px; }

        .ai-illustration {
            width: 300px; height: 180px; background: linear-gradient(135deg, #22c55e, #3b82f6);
            border-radius: 20px; margin-bottom: 50px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; font-size: 3rem;
        }

        .select-file-btn {
            background-color: var(--accent-purple); color: white;
            padding: 15px 40px; border-radius: 30px; font-weight: 600;
            border: none; cursor: pointer; font-size: 1rem; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.4);
        }
        .select-file-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .drop-zone {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(109, 40, 217, 0.05); border: 2px dashed var(--accent-purple);
            display: none; align-items: center; justify-content: center; z-index: 10;
        }

        /* 하단 유저 프로필 */
        .sidebar-footer {
            padding: 20px; border-top: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 10px; font-size: 0.85rem;
        }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #555; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 좌측 레이아웃 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Xeon Studio</span>
            <i class="fas fa-bars" style="cursor:pointer;" onclick="toggleSidebar()"></i>
        </div>

        <div class="menu-section">
            <div class="section-title">트랙 분리</div>
            <div class="menu-item active" onclick="showView('vocal')"><i class="fas fa-microphone-lines"></i> 보컬 제거</div>
            <div class="menu-item" onclick="showView('4stems')"><i class="fas fa-drum"></i> 4개 섹션 분리</div>
            <div class="menu-item" onclick="showView('6stems')"><i class="fas fa-guitar"></i> 6개 섹션 분리</div>
        </div>

        <div class="menu-section">
            <div class="section-title">기타 기능</div>
            <div class="menu-item"><i class="fas fa-file-lines"></i> 가사 추출</div>
            <div class="menu-item"><i class="fas fa-circle-dot"></i> 녹음하기</div>
        </div>

        <div class="library-section">
            <div class="section-title">트랙 보관함 <i class="fas fa-plus-circle" style="float:right; cursor:pointer;" onclick="addFolder()"></i></div>
            <div id="folder-list">
                <div class="folder-item"><i class="fas fa-folder"></i> &nbsp; 내 리스트</div>
                <div class="track-list-item" draggable="true">다시노래해 - 보컬.wav</div>
                <div class="track-list-item" draggable="true">다시노래해 - 드럼.wav</div>
                <div class="folder-item"><i class="fas fa-folder"></i> &nbsp; 가족 프로젝트</div>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="user-avatar"></div>
            <div>
                <div style="font-weight:600">User_Xeon</div>
                <div style="font-size:0.7rem; color:var(--text-dim)">Free Plan</div>
            </div>
        </div>
    </div>

    <!-- 우측 레이아웃 -->
    <div class="main-content" id="main-content">
        <!-- 업로드 뷰 -->
        <div class="upload-view" id="upload-view">
            <div class="hero-title">보컬 리무버 및 격리</div>
            <div class="hero-subtitle">강력한 AI 알고리즘으로 노래에서 음악과 음성을 분리하세요.</div>
            
            <div class="ai-illustration">
                <i class="fas fa-wave-square"></i>
            </div>

            <button class="select-file-btn" onclick="document.getElementById('file-input').click()">파일 선택</button>
            <input type="file" id="file-input" hidden>
            <p style="margin-top:20px; font-size:0.8rem; color:var(--text-dim)">또는 파일을 여기로 드래그하세요</p>
        </div>

        <!-- 드래그 오버 존 -->
        <div class="drop-zone" id="drop-zone">
            <h2>파일을 놓아서 업로드</h2>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        sb.style.width = sb.style.width === '70px' ? '260px' : '70px';
        // 텍스트 숨기기 로직 추가 가능
    }

    // 드래그 앤 드롭 로직
    const mainContent = document.getElementById('main-content');
    const dropZone = document.getElementById('drop-zone');

    mainContent.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.display = 'flex';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.display = 'none';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.display = 'none';
        const files = e.dataTransfer.files;
        if(files.length > 0) {
            alert(files[0].name + " 파일을 업로드합니다.");
            // 여기에 업로드 함수 연결
        }
    });

    function addFolder() {
        const name = prompt("새 폴더 이름을 입력하세요:");
        if(name) {
            const list = document.getElementById('folder-list');
            const div = document.createElement('div');
            div.className = 'folder-item';
            div.innerHTML = `<i class="fas fa-folder"></i> &nbsp; ${name}`;
            list.appendChild(div);
        }
    }
</script>

</body>
</html>
